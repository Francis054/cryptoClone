<head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/grid-style.css" />
    <link rel="stylesheet" href="../css/calculator-style.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="crypto-nav">
        <div class="nav-logo">
            <img class="nav-logo-image" src="../images/logo.png" alt="Logo" />
            <span id="nav-logo-text">ether.fi</span>
        </div>
        <div class="nav-menu">
            <ul class="nav--menu-items">
                <li><a href="../index.html">Stake</a></li>
                <li><a href="#">Liquid</a></li>
                <li><a href="#">Cash</a></li>
                <li><a href="#">Business</a></li>
                <li><a href="#">The Club</a></li>
                <li><a href="#">Liquid</a></li>
                <li><a href="../pages/cssgrid.html">CssGrid</a></li>
                <li><a href="/pages/calculator.html">Calculator</a></li>
            </ul>
        </div>
        <div>
            <button class="nav-btn">Open App</button>
        </div>
    </nav>
    
    <!-- End Navigation -->
    <div class="calculator-container">
        <div class="grid-parent">
            <!-- display -->
            <div class="display">
                <h3>100</h3>
            </div>
            <!-- end display -->

            <!-- buttons  -->
            <!-- row 1 -->
            <button class="ac">AC</button>
            <button class="parentheses">( )</button>
            <button class="percent">%</button>
            <button class="divide">/</button>
            <!-- end row 1 -->

            <!-- row 2 -->
            <button class="seven">7</button>
            <button class="eight">8</button>
            <button class="nine">9</button>
            <button class="multipy">*</button>
            <!-- end row 2 -->

            <!-- row 3 -->
            <button class="four">4</button>
            <button class="five">5</button>
            <button class="six">6</button>
            <button class="subtractt">-</button>
            <!-- end row 3 -->

            <!-- row 4 -->
            <button class="one">1</button>
            <button class="two">2</button>
            <button class="three">3</button>
            <button class="plus">+</button>
            <!-- end row 4 -->

            <!-- row 5 -->
            <button class="zeroo">0</button>
            <button class="dott">.</button>
            <button class="delete">d</button>
            <button class="equal">=</button>
            <!-- end row 5 -->

            <!-- end buttons -->
        </div>
    </div>

</body>

</html
